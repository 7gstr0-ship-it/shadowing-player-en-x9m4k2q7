name: Update Feeds

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch RSS feeds
        run: python fetch_feeds.py

      - name: Commit feeds.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds.json
          git diff --cached --quiet || git commit -m "chore: update feeds $(date -u +%Y-%m-%d)"
          git push
