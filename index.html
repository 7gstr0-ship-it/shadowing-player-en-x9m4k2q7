<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Shadowing">
<title>Shadowing Player</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;
    --text:#111111;--muted:#888888;--border:#e0e0e0;
    --accent:#111111;--accent-fg:#ffffff;
    --info-bg:#e8f0fe;--info-text:#1a56db;--info-border:#b3c8fa;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
      --text:#f0f0f0;--muted:#888888;--border:#333333;
      --accent:#f0f0f0;--accent-fg:#1a1a1a;
      --info-bg:#1e2a45;--info-text:#7aadff;--info-border:#2d4a80;
    }
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  /* HEADER */
  .header{padding:16px 16px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
  .header-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .header-icon i{color:var(--accent-fg);font-size:18px}
  .header-text h1{font-size:16px;font-weight:600;color:var(--text)}
  .header-text p{font-size:11px;color:var(--muted);margin-top:1px}

  /* TABS */
  .tabs{display:flex;padding:12px 16px 0;gap:6px}
  .tab{font-size:13px;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all 0.15s}
  .tab.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}

  /* EPISODE LIST */
  #list-view{flex:1;overflow-y:auto}
  .ep-list{padding:8px 0}
  .ep-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.12s}
  .ep-item:active{background:var(--bg2)}
  .ep-num{font-size:11px;color:var(--muted);min-width:22px;text-align:right;flex-shrink:0}
  .ep-info{flex:1;min-width:0}
  .ep-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ep-date{font-size:11px;color:var(--muted);margin-top:2px}
  .ep-arrow{font-size:16px;color:var(--border);flex-shrink:0}
  .loading{padding:2rem;text-align:center;font-size:13px;color:var(--muted)}
  .err{margin:16px;padding:12px;font-size:12px;color:#c0392b;background:#fdecea;border-radius:10px;line-height:1.5}

  /* PLAYER */
  #player-view{display:none;flex-direction:column;flex:1;overflow-y:auto}
  #player-view.visible{display:flex}

  .player-header{display:flex;align-items:center;gap:8px;padding:14px 16px 12px;border-bottom:0.5px solid var(--border)}
  .back-btn{background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;font-size:13px;font-family:inherit;padding:0;flex-shrink:0}
  .back-btn i{font-size:18px}
  .now-title{font-size:13px;font-weight:500;color:var(--text);flex:1;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

  .player-body{padding:16px;display:flex;flex-direction:column;gap:14px}

  /* PROGRESS */
  .progress-wrap{position:relative;height:44px;cursor:pointer;display:flex;align-items:center}
  .progress-bg{position:absolute;left:0;right:0;height:3px;background:var(--border);border-radius:2px}
  .progress-ab{position:absolute;height:3px;background:var(--info-bg);border:0.5px solid var(--info-border);border-radius:2px;display:none}
  .progress-fill{position:absolute;left:0;height:3px;background:var(--accent);border-radius:2px;width:0%}
  .progress-thumb{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--accent);left:0;transform:translateX(-50%);top:50%;margin-top:-8px}
  .time-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:-8px}

  /* SPEED */
  .ctrl-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
  .speed-btns{display:flex;gap:6px}
  .spd-btn{font-size:12px;padding:6px 0;flex:1;border:0.5px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all 0.15s}
  .spd-btn.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent);font-weight:500}

  /* AB REPEAT */
  .ab-row{display:flex;gap:6px;align-items:center}
  .ab-btn{font-size:12px;padding:7px 16px;border:0.5px solid var(--border);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;font-family:inherit;transition:all 0.15s;font-weight:500}
  .ab-btn.set{background:var(--info-bg);color:var(--info-text);border-color:var(--info-border)}
  .ab-clear{font-size:12px;padding:7px 12px;border:0.5px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;margin-left:auto}

  /* NATIVE AUDIO (fallback) */
  .audio-native{width:100%}
  audio{width:100%;border-radius:8px;height:40px}

  /* SCRIPT */
  .script-header{display:flex;align-items:center;justify-content:space-between}
  .script-toggle{font-size:12px;padding:4px 10px;border:0.5px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit}
  .script-box{background:var(--bg2);border-radius:10px;padding:14px;font-size:14px;line-height:1.8;color:var(--text);border:0.5px solid var(--border);max-height:260px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .script-box.hidden{display:none}
  .script-empty{color:var(--muted);font-style:italic;font-size:13px}

  /* DIVIDER */
  .divider{height:0.5px;background:var(--border)}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-icon"><i class="ti ti-microphone"></i></div>
    <div class="header-text">
      <h1>Shadowing Player</h1>
      <p>CNN 10 · VOA Learning English</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchSource('cnn',this)">CNN 10</button>
    <button class="tab" onclick="switchSource('voa',this)">VOA</button>
  </div>

  <div id="list-view">
    <div class="ep-list" id="ep-list">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div id="player-view">
    <div class="player-header">
      <button class="back-btn" onclick="showList()">
        <i class="ti ti-chevron-left"></i>
      </button>
      <div class="now-title" id="now-title"></div>
    </div>
    <div class="player-body">

      <div>
        <div class="progress-wrap" id="prog-wrap">
          <div class="progress-bg"></div>
          <div class="progress-ab" id="prog-ab"></div>
          <div class="progress-fill" id="prog-fill"></div>
          <div class="progress-thumb" id="prog-thumb"></div>
        </div>
        <div class="time-row">
          <span id="t-cur">0:00</span>
          <span id="t-dur">0:00</span>
        </div>
      </div>

      <div class="audio-native">
        <audio id="player" controls></audio>
      </div>

      <div class="divider"></div>

      <div>
        <div class="ctrl-label">Speed</div>
        <div class="speed-btns">
          <button class="spd-btn" data-speed="0.6" onclick="setSpeed(0.6,this)">0.6×</button>
          <button class="spd-btn" data-speed="0.75" onclick="setSpeed(0.75,this)">0.75×</button>
          <button class="spd-btn active" data-speed="1" onclick="setSpeed(1.0,this)">1×</button>
          <button class="spd-btn" data-speed="1.25" onclick="setSpeed(1.25,this)">1.25×</button>
        </div>
      </div>

      <div>
        <div class="ctrl-label">AB Repeat</div>
        <div class="ab-row">
          <button class="ab-btn" id="btn-a" onclick="setA()">Set A</button>
          <button class="ab-btn" id="btn-b" onclick="setB()">Set B</button>
          <button class="ab-clear" onclick="clearAB()">Clear</button>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="script-header">
          <div class="ctrl-label" style="margin-bottom:0">Script</div>
          <button class="script-toggle" id="script-toggle-btn" onclick="toggleScript()">Hide</button>
        </div>
        <div style="height:8px"></div>
        <div class="script-box" id="script-box">
          <span class="script-empty">Select an episode to begin.</span>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const PROXY = 'https://api.allorigins.win/raw?url=';
const FEEDS = {
  cnn:  'https://podcasts.files.bbci.co.uk/p02nq0gn.rss',
  voa:  'https://learningenglish.voanews.com/podcast/?zoneId=1689'
};

let currentSrc = 'cnn';
let episodes = [];
let abA = null, abB = null;
let scriptVisible = true;
const audio = document.getElementById('player');

function switchSource(src, el) {
  currentSrc = src;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  showList();
  loadFeed(src);
}

async function loadFeed(src) {
  const list = document.getElementById('ep-list');
  list.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const url = FEEDS[src];
    const res = await fetch(PROXY + encodeURIComponent(url));
    if (!res.ok) throw new Error('network');
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, 'text/xml');
    const items = [...xml.querySelectorAll('item')].slice(0, 12);
    episodes = items.map(item => ({
      title: item.querySelector('title')?.textContent?.trim() || 'Episode',
      audioUrl: item.querySelector('enclosure')?.getAttribute('url') || '',
      pubDate: item.querySelector('pubDate')?.textContent || '',
      desc: (item.querySelector('description')?.textContent || '').replace(/<[^>]+>/g,'').trim()
    }));
    renderList();
  } catch(e) {
    list.innerHTML = `<div class="err">フィードを読み込めませんでした。<br>ネットワーク接続を確認してください。<br><br><small>${e.message}</small></div>`;
  }
}

function renderList() {
  const list = document.getElementById('ep-list');
  list.innerHTML = '';
  if (!episodes.length) { list.innerHTML = '<div class="loading">エピソードが見つかりません</div>'; return; }
  episodes.forEach((ep, i) => {
    const d = document.createElement('div');
    d.className = 'ep-item';
    const dateStr = ep.pubDate ? new Date(ep.pubDate).toLocaleDateString('ja-JP',{month:'short',day:'numeric'}) : '';
    d.innerHTML = `
      <span class="ep-num">${i+1}</span>
      <div class="ep-info">
        <div class="ep-title">${ep.title}</div>
        <div class="ep-date">${dateStr}</div>
      </div>
      <i class="ti ti-chevron-right ep-arrow"></i>`;
    d.addEventListener('click', () => openEpisode(i));
    list.appendChild(d);
  });
}

function openEpisode(i) {
  const ep = episodes[i];
  audio.src = ep.audioUrl;
  audio.playbackRate = 1.0;
  document.querySelectorAll('.spd-btn').forEach(b => b.classList.toggle('active', parseFloat(b.dataset.speed) === 1.0));
  abA = null; abB = null;
  updateABUI();
  document.getElementById('now-title').textContent = ep.title;
  const box = document.getElementById('script-box');
  if (ep.desc && ep.desc.length > 60) {
    box.innerHTML = ep.desc;
  } else {
    box.innerHTML = '<span class="script-empty">スクリプトはこのエピソードでは利用できません。</span>';
  }
  showPlayer();
  audio.play().catch(() => {});
}

function showPlayer() {
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('player-view').classList.add('visible');
}

function showList() {
  audio.pause();
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('player-view').classList.remove('visible');
}

function setSpeed(s, el) {
  audio.playbackRate = s;
  document.querySelectorAll('.spd-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function fmt(t) {
  if (isNaN(t)) return '0:00';
  const m = Math.floor(t/60), s = Math.floor(t%60);
  return m + ':' + (s<10?'0':'') + s;
}

function setA() {
  abA = audio.currentTime;
  const btn = document.getElementById('btn-a');
  btn.classList.add('set');
  btn.textContent = 'A ' + fmt(abA);
  updateABBar();
}

function setB() {
  abB = audio.currentTime;
  const btn = document.getElementById('btn-b');
  btn.classList.add('set');
  btn.textContent = 'B ' + fmt(abB);
  updateABBar();
}

function clearAB() {
  abA = null; abB = null;
  updateABUI();
}

function updateABUI() {
  const bA = document.getElementById('btn-a');
  const bB = document.getElementById('btn-b');
  bA.classList.remove('set'); bA.textContent = 'Set A';
  bB.classList.remove('set'); bB.textContent = 'Set B';
  document.getElementById('prog-ab').style.display = 'none';
}

function updateABBar() {
  if (abA === null || abB === null) return;
  const dur = audio.duration || 1;
  const lo = Math.min(abA,abB), hi = Math.max(abA,abB);
  const ab = document.getElementById('prog-ab');
  ab.style.display = 'block';
  ab.style.left = (lo/dur*100)+'%';
  ab.style.width = ((hi-lo)/dur*100)+'%';
}

function toggleScript() {
  scriptVisible = !scriptVisible;
  document.getElementById('script-box').classList.toggle('hidden', !scriptVisible);
  document.getElementById('script-toggle-btn').textContent = scriptVisible ? 'Hide' : 'Show';
}

audio.addEventListener('timeupdate', () => {
  const cur = audio.currentTime, dur = audio.duration || 1;
  document.getElementById('t-cur').textContent = fmt(cur);
  document.getElementById('t-dur').textContent = fmt(isNaN(audio.duration) ? 0 : audio.duration);
  const pct = Math.min(cur/dur*100, 100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-thumb').style.left = pct+'%';
  updateABBar();
  if (abA !== null && abB !== null) {
    const hi = Math.max(abA,abB), lo = Math.min(abA,abB);
    if (cur >= hi) audio.currentTime = lo;
  }
});

const progWrap = document.getElementById('prog-wrap');
progWrap.addEventListener('click', e => {
  const rect = progWrap.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
});

loadFeed('cnn');
</script>
</body>
</html>
